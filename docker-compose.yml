services:
  invoice-ocr:
    build: .
    container_name: invoice-ocr
    ports:
      - "8999:8999"
    volumes:
      # 可选：挂载本地目录存放上传文件（持久化）
      - ./uploads:/tmp/uploads
    environment:
      - FLASK_ENV=production
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME:-gpt-4o}
    env_file:
      - .env
    restart: unless-stopped
    # 如果需要 GPU 加速 PaddleOCR，取消下面注释
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
