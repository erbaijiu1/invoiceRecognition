services:
  invoice-ocr:
    build: .
    container_name: invoice-ocr
    ports:
      - "8999:8999"
    volumes:
      # 挂载当前目录到容器内，避免修改代码需重新构建
      - .:/app
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME:-hunyuan-vision}
    env_file:
      - .env
    restart: unless-stopped
    # 如果需要 GPU 加速 PaddleOCR，取消下面注释
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
